<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>One Million Checkboxes</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Manrope:wght@500;700;800&display=swap");

      :root {
        --bg: #f2f3f5;
        --panel: #f8f9fb;
        --line: #e3e7ee;
        --text-main: #0f172a;
        --text-soft: #556172;
        --s1: #e7b7d6;
        --s2: #cbb8e8;
        --s3: #b8c4ef;
        --s4: #87d5de;
        --s5: #89dcc1;
        --s6: #b7df7f;
        --s7: #f3d67a;
        --s8: #efb8b6;
        --s9: #e79ecf;
        --s10: #aeb1f3;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--bg);
        color: var(--text-main);
        font-family: "Manrope", "Segoe UI", sans-serif;
      }

      .shell {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
      }

      .topbar {
        background: #f0f2f5;
        border: 1px solid var(--line);
        border-bottom: none;
        padding: 2rem 2rem 1.25rem;
      }

      .title {
        margin: 0;
        font-size: clamp(2rem, 3vw, 2.8rem);
        font-weight: 800;
        letter-spacing: -0.02em;
      }

      .summary {
        margin-top: 0.7rem;
        font-size: 1.15rem;
        color: var(--text-soft);
      }

      .error-banner {
        margin-top: 0.8rem;
        display: none;
        background: #fee2e2;
        border: 1px solid #fecaca;
        color: #991b1b;
        border-radius: 10px;
        padding: 0.55rem 0.8rem;
        font-size: 0.95rem;
        font-weight: 700;
      }

      .error-banner.show {
        display: block;
      }

      .grid-wrap {
        background: var(--panel);
        border: 1px solid var(--line);
        overflow: auto;
        padding: 1rem;
        flex: 1;
      }

      #container {
        min-width: 1180px;
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(24px, 1fr));
        gap: 4px;
      }

      #container input[type="checkbox"] {
        margin: 0;
        width: 24px;
        height: 24px;
        border-radius: 9px;
        appearance: none;
        background: #f7f8fa;
        border: 1px solid #d5dce6;
        cursor: pointer;
        transition:
          transform 140ms ease,
          background-color 140ms ease,
          border-color 140ms ease;
      }

      #container input[type="checkbox"]:hover {
        transform: scale(1.04);
      }

      #container input[type="checkbox"]:checked {
        background: var(--segment-color, var(--s1));
        border-color: transparent;
      }

      @media (max-width: 768px) {
        .topbar {
          padding: 1.2rem 1rem 1rem;
        }

        #container {
          min-width: 900px;
        }
      }
    </style>
  </head>
  <body>
    <div class="shell">
      <header class="topbar">
        <h1 class="title">One Million Checkboxes</h1>
        <div id="summary" class="summary">0 / 0 checked</div>
        <div id="errorBanner" class="error-banner"></div>
      </header>

      <section class="grid-wrap">
        <div id="container"></div>
      </section>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script>
      const container = document.getElementById("container");
      const summary = document.getElementById("summary");
      const errorBanner = document.getElementById("errorBanner");
      const socket = io();

      const SECTION_COUNT = 10;
      const SECTION_COLORS = [
        "var(--s1)",
        "var(--s2)",
        "var(--s3)",
        "var(--s4)",
        "var(--s5)",
        "var(--s6)",
        "var(--s7)",
        "var(--s8)",
        "var(--s9)",
        "var(--s10)",
      ];

      function getSection(index, total) {
        const sectionSize = Math.ceil(total / SECTION_COUNT);
        return Math.min(SECTION_COUNT - 1, Math.floor(index / sectionSize));
      }

      function updateSummary() {
        const total = container.querySelectorAll('input[type="checkbox"]').length;
        const checked = container.querySelectorAll(
          'input[type="checkbox"]:checked',
        ).length;
        summary.textContent = `${checked.toLocaleString()} / ${total.toLocaleString()} checked`;
      }

      let errorTimer;
      function showError(message) {
        errorBanner.textContent = message || "Please wait before sending another update.";
        errorBanner.classList.add("show");
        clearTimeout(errorTimer);
        errorTimer = setTimeout(() => {
          errorBanner.classList.remove("show");
          errorBanner.textContent = "";
        }, 2300);
      }

      socket.on("server:checkbox:change", ({ index, checked }) => {
        const input = document.getElementById(`checkbox-${index}`);
        if (!input) return;
        input.checked = checked;
        updateSummary();
      });

      socket.on("server-error", ({ error }) => {
        showError(error);
      });

      window.addEventListener("load", async () => {
        const response = await fetch("/checkboxes", { method: "GET" });
        const data = await response.json();

        if (!(data && data.checkboxes)) return;

        const total = data.checkboxes.length;
        data.checkboxes.forEach((checked, index) => {
          const input = document.createElement("input");
          input.type = "checkbox";
          input.id = `checkbox-${index}`;
          input.checked = checked;

          const section = getSection(index, total);
          input.dataset.section = String(section);
          input.style.setProperty("--segment-color", SECTION_COLORS[section]);

          input.addEventListener("change", (event) => {
            const nextChecked = event.target.checked;
            socket.emit("client:checkbox:change", { index, checked: nextChecked });
            updateSummary();
          });

          container.appendChild(input);
        });

        updateSummary();
      });
    </script>
  </body>
</html>
